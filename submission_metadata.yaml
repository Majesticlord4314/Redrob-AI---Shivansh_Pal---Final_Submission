# ============================================================================
# AI tools declaration (transparency only)
# ============================================================================
ai_tools_used:
  - "Claude"        # Claude Code — recon, architecture, implementation, review

ai_usage_summary: |
  Built with Claude Code as a pair-engineer: dataset reconnaissance, architecture
  design, implementation, and iterative debugging. All design decisions were made
  by inspecting real data and measuring against a hand-tiered gold set. No
  candidate data was sent to any hosted LLM, and the ranking step makes no LLM
  calls (it is pure Python stdlib).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based, consistency-gated ranker (pure Python stdlib, ~16s/100k, CPU only).
  Pipeline: stream candidates -> internal-consistency gate dropping ~70 honeypots
  (expert skill with 0 months; documented months exceeding stated experience or
  calendar; a single role longer than the whole career; experience exceeding time
  since the first job; date corruption) -> title->role-family classification that
  GATES all free-text signals, so AI keywords on a non-AI title count as stuffing,
  not fit -> trusted skill-DOMAIN coverage (a skill counts only when corroborated
  by duration/endorsements/assessment; we score distinct trusted domains —
  embeddings, vector DB, NLP/IR — not skill count) -> company product-vs-services
  career-arc -> summary-archetype quality signal -> weighted fit -> bounded
  behavioral availability modifier (x0.6-1.1; -1 sentinels treated as unknown).
  Top-100 is emitted with strictly-decreasing scores and feature-grounded
  reasoning generated only from facts present in each profile (no hallucination by
  construction). Validated on a 104-candidate hand-tiered gold set (composite 0.99,
  NDCG@10 1.0); top-10 stable under +/-20% weight perturbation; top-100 honeypot
  rate 0%. Embeddings and learning-to-rank were tested and did not beat the rules
  (and are indefensible without real labels), so they were dropped.

